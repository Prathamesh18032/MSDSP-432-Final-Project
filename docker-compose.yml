name: smartcity-zero-disk

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: smartcity-timescaledb
    environment:
      POSTGRES_DB: ${TIMESCALE_DB:-smartcity_hot}
      POSTGRES_USER: ${TIMESCALE_USER:-smartcity}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-smartcity_dev_password}
    ports:
      - "${TIMESCALE_PORT:-5432}:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./infra/local/timescaledb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  metadata-db:
    image: postgres:15
    container_name: smartcity-metadata-db
    environment:
      POSTGRES_DB: ${METADATA_DB_NAME:-smartcity_metadata}
      POSTGRES_USER: ${METADATA_DB_USER:-smartcity_meta}
      POSTGRES_PASSWORD: ${METADATA_DB_PASSWORD:-smartcity_meta_dev_password}
    ports:
      - "${METADATA_DB_PORT:-5433}:5432"
    volumes:
      - metadata-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana-oss:latest
    container_name: smartcity-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      TIMESCALE_DB: ${TIMESCALE_DB:-smartcity_hot}
      TIMESCALE_USER: ${TIMESCALE_USER:-smartcity}
      TIMESCALE_PASSWORD: ${TIMESCALE_PASSWORD:-smartcity_dev_password}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/local/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      timescaledb:
        condition: service_healthy

  streamlit:
    profiles:
      - analytics
    build:
      context: .
      dockerfile: apps/streamlit/Dockerfile
    container_name: smartcity-streamlit
    environment:
      STREAMLIT_TIMESCALE_DSN: postgresql://${TIMESCALE_USER:-smartcity}:${TIMESCALE_PASSWORD:-smartcity_dev_password}@timescaledb:5432/${TIMESCALE_DB:-smartcity_hot}
      STREAMLIT_COLD_STORAGE_ROOT: /app/data/cold
      STREAMLIT_PORT: ${STREAMLIT_PORT:-8501}
      STREAMLIT_REFRESH_SECONDS: ${STREAMLIT_REFRESH_SECONDS:-60}
      STREAMLIT_DEFAULT_WINDOW_HOURS: ${STREAMLIT_DEFAULT_WINDOW_HOURS:-24}
      STREAMLIT_BRAND_TITLE: ${STREAMLIT_BRAND_TITLE:-Smart City Command Center}
      STREAMLIT_CITY_NAME: ${STREAMLIT_CITY_NAME:-Chicago}
      STREAMLIT_ENABLE_GBFS_STATION_NAMES: ${STREAMLIT_ENABLE_GBFS_STATION_NAMES:-true}
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    volumes:
      - ./apps/streamlit:/app/apps/streamlit:ro
      - ./data/cold:/app/data/cold:ro
    depends_on:
      timescaledb:
        condition: service_healthy

  video-agent:
    profiles:
      - ai
    build:
      context: .
      dockerfile: services/video-agent/Dockerfile
    container_name: smartcity-video-agent
    environment:
      VIDEO_AGENT_TIMESCALE_DSN: postgresql://${TIMESCALE_USER:-smartcity}:${TIMESCALE_PASSWORD:-smartcity_dev_password}@timescaledb:5432/${TIMESCALE_DB:-smartcity_hot}
      VIDEO_AGENT_INPUT_DIR: /app/data/video_inbox
      VIDEO_AGENT_CITY: ${VIDEO_AGENT_CITY:-chicago}
      VIDEO_AGENT_CAMERA_ID: ${VIDEO_AGENT_CAMERA_ID:-demo-001}
      VIDEO_AGENT_THRESHOLD: ${VIDEO_AGENT_THRESHOLD:-0.65}
      VIDEO_AGENT_MODEL: ${VIDEO_AGENT_MODEL:-OPear/videomae-large-finetuned-UCF-Crime}
      VIDEO_AGENT_BINARY_MODEL: ${VIDEO_AGENT_BINARY_MODEL:-dima806/crime_cctv_image_detection}
      VIDEO_AGENT_TYPE_MODEL: ${VIDEO_AGENT_TYPE_MODEL:-dima806/crime_type_cctv_image_detection}
      VIDEO_AGENT_CRIME_THRESHOLD: ${VIDEO_AGENT_CRIME_THRESHOLD:-0.50}
      VIDEO_AGENT_MODEL_VERSION: ${VIDEO_AGENT_MODEL_VERSION:-mvp}
      VIDEO_AGENT_MOCK_MODEL: ${VIDEO_AGENT_MOCK_MODEL:-false}
      VIDEO_AGENT_DRY_RUN: ${VIDEO_AGENT_DRY_RUN:-false}
      VIDEO_AGENT_POLL_SECONDS: ${VIDEO_AGENT_POLL_SECONDS:-10800}
    command: ["--once", "--local-scan"]
    volumes:
      - ./data/video_inbox:/app/data/video_inbox:ro
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  timescale-data:
  metadata-data:
  grafana-data:
