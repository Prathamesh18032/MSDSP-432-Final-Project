name: CI

on:
  push:
  pull_request:

jobs:
  scaffold:
    name: Scaffold validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate expected repo structure
        run: make check

  go-tests:
    name: Go unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run Go tests
        run: make test

  compose:
    name: Docker Compose config
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose config

  cloud-readiness:
    name: Cloud readiness scaffold
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate cloud scaffold
        run: make cloud-check
