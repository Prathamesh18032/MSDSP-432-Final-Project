name: CI

on:
  push:
  pull_request:

jobs:
  scaffold:
    name: Scaffold validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate expected repo structure
        run: make check

  go-tests:
    name: Go unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Run Go tests
        run: make test

  compose:
    name: Docker Compose config
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose config

  video-agent:
    name: Video agent checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run lightweight AI checks
        run: make ai-check

  cloud-readiness:
    name: Cloud readiness scaffold
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate cloud scaffold
        run: make cloud-check

      - name: Validate CI/CD workflow
        run: make ci-cd-check

  container-images:
    name: Container image build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build container images
        run: make docker-build

      - name: Smoke-test container images
        run: make docker-smoke
