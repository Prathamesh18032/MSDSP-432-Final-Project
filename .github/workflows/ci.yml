name: CI

on:
  push:
  pull_request:

jobs:
  foundation:
    name: Foundation checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Validate scaffold
        run: make check

      - name: Run Go tests
        run: make test
