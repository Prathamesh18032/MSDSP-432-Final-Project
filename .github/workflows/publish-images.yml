name: Publish Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  IMAGE_REGISTRY: asia-south1-docker.pkg.dev/smartcity-zero-disk-iot-pa/smartcity

jobs:
  publish:
    name: Build and publish ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: smartcity-ingestor
            dockerfile: services/ingestor/Dockerfile
          - name: smartcity-writer
            dockerfile: services/writer/Dockerfile
          - name: smartcity-streamlit
            dockerfile: apps/streamlit/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Require repository variables
        run: |
          test -n "${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}"
          test -n "${{ vars.GCP_CI_SERVICE_ACCOUNT }}"

      - name: Derive image tags
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "${GITHUB_ENV}"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: asia-south1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.auth_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ matrix.name }}:${{ env.SHORT_SHA }}
            ${{ env.IMAGE_REGISTRY }}/${{ matrix.name }}:latest-main
