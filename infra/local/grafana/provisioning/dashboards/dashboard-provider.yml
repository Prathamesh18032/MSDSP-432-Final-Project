apiVersion: 1

providers:
  - name: Smart City Dashboards
    orgId: 1
    folder: Smart City
    folderUid: smart-city
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
