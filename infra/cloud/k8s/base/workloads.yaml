apiVersion: v1
kind: Service
metadata:
  name: smartcity-timescaledb
  namespace: __GKE_NAMESPACE__
  labels:
    app.kubernetes.io/name: smartcity-timescaledb
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: smartcity-timescaledb
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: smartcity-timescaledb
  namespace: __GKE_NAMESPACE__
  labels:
    app.kubernetes.io/name: smartcity-timescaledb
spec:
  serviceName: smartcity-timescaledb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smartcity-timescaledb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smartcity-timescaledb
    spec:
      containers:
        - name: timescaledb
          image: __K8S_TIMESCALE_IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: K8S_TIMESCALE_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: K8S_TIMESCALE_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartcity-runtime-secrets
                  key: TIMESCALE_PASSWORD
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "__K8S_TIMESCALE_USER__", "-d", "__K8S_TIMESCALE_DB__"]
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "__K8S_TIMESCALE_USER__", "-d", "__K8S_TIMESCALE_DB__"]
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: timescale-data
              mountPath: /var/lib/postgresql/data
            - name: timescale-init
              mountPath: /docker-entrypoint-initdb.d/001_schema.sql
              subPath: 001_schema.sql
      volumes:
        - name: timescale-init
          configMap:
            name: smartcity-timescale-init
  volumeClaimTemplates:
    - metadata:
        name: timescale-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: __K8S_TIMESCALE_STORAGE_SIZE__
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartcity-ingestor
  namespace: __GKE_NAMESPACE__
  labels:
    app.kubernetes.io/name: smartcity-ingestor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smartcity-ingestor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smartcity-ingestor
    spec:
      serviceAccountName: smartcity-ingestor
      containers:
        - name: ingestor
          image: __IMAGE_REGISTRY__/smartcity-ingestor:__RUNTIME_IMAGE_TAG__
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: smartcity-config
          env:
            - name: OPENAQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smartcity-runtime-secrets
                  key: OPENAQ_API_KEY
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartcity-hot-writer
  namespace: __GKE_NAMESPACE__
  labels:
    app.kubernetes.io/name: smartcity-hot-writer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smartcity-hot-writer
