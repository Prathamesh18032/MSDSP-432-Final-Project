apiVersion: v1
kind: Service
metadata:
  name: smartcity-timescaledb
  namespace: __GKE_NAMESPACE__
  labels:
    app.kubernetes.io/name: smartcity-timescaledb
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: smartcity-timescaledb
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: smartcity-timescaledb
  namespace: __GKE_NAMESPACE__
  labels:
    app.kubernetes.io/name: smartcity-timescaledb
spec:
  serviceName: smartcity-timescaledb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smartcity-timescaledb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smartcity-timescaledb
    spec:
      containers:
        - name: timescaledb
          image: __K8S_TIMESCALE_IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: K8S_TIMESCALE_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: K8S_TIMESCALE_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartcity-runtime-secrets
                  key: TIMESCALE_PASSWORD
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "__K8S_TIMESCALE_USER__", "-d", "__K8S_TIMESCALE_DB__"]
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "__K8S_TIMESCALE_USER__", "-d", "__K8S_TIMESCALE_DB__"]
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: timescale-data
              mountPath: /var/lib/postgresql/data
            - name: timescale-init
              mountPath: /docker-entrypoint-initdb.d/001_schema.sql
              subPath: 001_schema.sql
      volumes:
        - name: timescale-init
          configMap:
            name: smartcity-timescale-init
  volumeClaimTemplates:
    - metadata:
        name: timescale-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: __K8S_TIMESCALE_STORAGE_SIZE__
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartcity-ingestor
  namespace: __GKE_NAMESPACE__
  labels:
    app.kubernetes.io/name: smartcity-ingestor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smartcity-ingestor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smartcity-ingestor
    spec:
      serviceAccountName: smartcity-ingestor
      containers:
        - name: ingestor
          image: __IMAGE_REGISTRY__/smartcity-ingestor:__RUNTIME_IMAGE_TAG__
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: smartcity-config
          env:
            - name: OPENAQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smartcity-runtime-secrets
                  key: OPENAQ_API_KEY
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartcity-hot-writer
  namespace: __GKE_NAMESPACE__
  labels:
    app.kubernetes.io/name: smartcity-hot-writer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smartcity-hot-writer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smartcity-hot-writer
    spec:
      serviceAccountName: smartcity-writer
      containers:
        - name: writer
          image: __IMAGE_REGISTRY__/smartcity-writer:__RUNTIME_IMAGE_TAG__
          imagePullPolicy: Always
          command: ["/usr/local/bin/consume-pubsub"]
          envFrom:
            - configMapRef:
                name: smartcity-config
          env:
            - name: TIMESCALE_DSN
              valueFrom:
                secretKeyRef:
                  name: smartcity-runtime-secrets
                  key: TIMESCALE_DSN
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: smartcity-timescale-backup
  namespace: __GKE_NAMESPACE__
  labels:
    app.kubernetes.io/name: smartcity-timescale-backup
spec:
  schedule: "__TIMESCALE_BACKUP_SCHEDULE__"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: smartcity-writer
          restartPolicy: OnFailure
          containers:
            - name: writer
              image: __IMAGE_REGISTRY__/smartcity-writer:__RUNTIME_IMAGE_TAG__
              imagePullPolicy: Always
              command: ["/usr/local/bin/backup-timescale"]
              envFrom:
                - configMapRef:
                    name: smartcity-config
              env:
                - name: TIMESCALE_DSN
                  valueFrom:
                    secretKeyRef:
                      name: smartcity-runtime-secrets
                      key: TIMESCALE_DSN
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: smartcity-cold-export
  namespace: __GKE_NAMESPACE__
  labels:
    app.kubernetes.io/name: smartcity-cold-export
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: smartcity-writer
          restartPolicy: OnFailure
          containers:
            - name: writer
              image: __IMAGE_REGISTRY__/smartcity-writer:__RUNTIME_IMAGE_TAG__
              imagePullPolicy: Always
              envFrom:
                - configMapRef:
                    name: smartcity-config
              env:
                - name: TIMESCALE_DSN
                  valueFrom:
                    secretKeyRef:
                      name: smartcity-runtime-secrets
                      key: TIMESCALE_DSN
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartcity-streamlit
  namespace: __GKE_NAMESPACE__
  labels:
    app.kubernetes.io/name: smartcity-streamlit
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smartcity-streamlit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smartcity-streamlit
    spec:
      serviceAccountName: smartcity-analytics
      containers:
        - name: streamlit
          image: __IMAGE_REGISTRY__/smartcity-streamlit:__RUNTIME_IMAGE_TAG__
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8501
          envFrom:
            - configMapRef:
                name: smartcity-config
          env:
            - name: STREAMLIT_TIMESCALE_DSN
              valueFrom:
                secretKeyRef:
                  name: smartcity-runtime-secrets
                  key: TIMESCALE_DSN
            - name: STREAMLIT_DEMO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartcity-runtime-secrets
                  key: STREAMLIT_DEMO_PASSWORD
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: smartcity-streamlit
  namespace: __GKE_NAMESPACE__
  annotations:
    cloud.google.com/backend-config: '{"default":"smartcity-streamlit-backend"}'
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: smartcity-streamlit
  ports:
    - name: http
      port: 8501
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartcity-grafana
  namespace: __GKE_NAMESPACE__
  labels:
    app.kubernetes.io/name: smartcity-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smartcity-grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smartcity-grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana-oss:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: GRAFANA_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartcity-runtime-secrets
                  key: GRAFANA_ADMIN_PASSWORD
                  optional: true
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_SERVER_ROOT_URL
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: GRAFANA_ROOT_URL
                  optional: true
            - name: TIMESCALE_HOST
              value: smartcity-timescaledb
            - name: TIMESCALE_PORT
              value: "5432"
            - name: TIMESCALE_DB
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: K8S_TIMESCALE_DB
            - name: TIMESCALE_USER
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: K8S_TIMESCALE_USER
            - name: TIMESCALE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartcity-runtime-secrets
                  key: TIMESCALE_PASSWORD
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: grafana-provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dashboard-provider.yml
              subPath: dashboard-provider.yml
              readOnly: true
            - name: grafana-provisioning
              mountPath: /etc/grafana/provisioning/dashboards/smart-city-operations.json
              subPath: smart-city-operations.json
              readOnly: true
            - name: grafana-provisioning
              mountPath: /etc/grafana/provisioning/datasources/timescaledb.yml
              subPath: timescaledb.yml
              readOnly: true
            - name: grafana-provisioning
              mountPath: /etc/grafana/provisioning/alerting/smart-city-alerts.yml
              subPath: smart-city-alerts.yml
              readOnly: true
      volumes:
        - name: grafana-provisioning
          configMap:
            name: smartcity-grafana-provisioning
---
apiVersion: v1
kind: Service
metadata:
  name: smartcity-grafana
  namespace: __GKE_NAMESPACE__
  annotations:
    cloud.google.com/backend-config: '{"default":"smartcity-grafana-backend"}'
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: smartcity-grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
