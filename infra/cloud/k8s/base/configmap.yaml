apiVersion: v1
kind: ConfigMap
metadata:
  name: smartcity-config
  namespace: __GKE_NAMESPACE__
data:
  APP_ENV: cloud
  LOG_LEVEL: info
  GCP_PROJECT_ID: __GCP_PROJECT_ID__
  GCP_REGION: __GCP_REGION__
  GCP_PUBSUB_TOPIC: __GCP_PUBSUB_TOPIC__
  GCP_PUBSUB_DLQ_TOPIC: __GCP_PUBSUB_DLQ_TOPIC__
  GCP_PUBSUB_SUBSCRIPTION: __GCP_PUBSUB_SUBSCRIPTION__
  INGESTION_SINK: pubsub
  PUBSUB_MAX_MESSAGES: "100"
  PUBSUB_CONSUME_LIMIT: "0"
  GCS_BUCKET: __GCS_BUCKET__
  BIGQUERY_DATASET: __BIGQUERY_DATASET__
  BIGQUERY_EXTERNAL_TABLE: sensor_readings_external
  OPENAQ_COORDINATES: "41.8781,-87.6298"
  OPENAQ_RADIUS_METERS: "25000"
  OPENAQ_LOCATION_LIMIT: "5"
  MULTISOURCE_POLL_INTERVAL_SECONDS: "300"
  OPENMETEO_BASE_URL: https://api.open-meteo.com
  OPENMETEO_COORDINATES: "41.8781,-87.6298"
  GBFS_DISCOVERY_URL: https://gbfs.divvybikes.com/gbfs/gbfs.json
  GBFS_LANGUAGE: en
  GBFS_STATION_LIMIT: "25"
  USGS_BASE_URL: https://waterservices.usgs.gov
  USGS_SITE_IDS: "05536123"
  USGS_PARAMETER_CODES: "00065"
  COLD_STORAGE_ROOT: /tmp/smartcity-cold
  COLD_STORAGE_TARGET: gcs
  COLD_EXPORT_HOT_RETENTION_HOURS: "72"
  COLD_EXPORT_BATCH_SIZE: "1000"
  COLD_EXPORT_MODE: retention
  CLOUD_COLD_EXPORT_KEEP_LOCAL: "false"
  STREAMLIT_COLD_STORAGE_ROOT: /tmp/smartcity-cold
  K8S_TIMESCALE_DB: __K8S_TIMESCALE_DB__
  K8S_TIMESCALE_USER: __K8S_TIMESCALE_USER__
